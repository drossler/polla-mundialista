<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Apuestas - Polla Mundialista</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-futbol"></i>
                <span>Polla Mundialista</span>
            </div>
            <button class="sidebar-close" id="sidebar-close"><i class="fas fa-times"></i></button>
        </div>

        <div class="user-info">
            <div class="user-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="user-details">
                <h3 id="user-name">Usuario</h3>
                <p id="user-email">email@ejemplo.com</p>
                <span class="user-status" id="user-status">Pendiente de pago</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="fas fa-home"></i> Inicio
            </a>
            <a href="apuestas.html" class="active">
                <i class="fas fa-futbol"></i> Mis Apuestas
            </a>
            <a href="resultados.html">
                <i class="fas fa-chart-bar"></i> Resultados
            </a>
            <a href="posiciones.html">
                <i class="fas fa-trophy"></i> Tabla de Posiciones
            </a>
            <a href="calendario.html">
                <i class="fas fa-calendar-alt"></i> Calendario
            </a>
            <a href="perfil.html">
                <i class="fas fa-user"></i> Mi Perfil
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" id="logout-btn" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menu-toggle">
                <i class="fas fa-bars"></i>
            </button>
            <h2 class="page-title">Mis Apuestas</h2>
            <div class="top-bar-actions">
                <div class="notification-bell">
                    <i class="fas fa-bell"></i>
                    <span class="notification-count">3</span>
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- Filtros -->
            <div class="filters-bar">
                <div class="filter-group">
                    <label>Fase:</label>
                    <select id="filter-phase">
                        <option value="all">Todas</option>
                        <option value="group">Fase de Grupos</option>
                        <option value="round16">Octavos de Final</option>
                        <option value="quarter">Cuartos de Final</option>
                        <option value="semi">Semifinales</option>
                        <option value="final">Final</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Estado:</label>
                    <select id="filter-status">
                        <option value="all">Todos</option>
                        <option value="pending">Pendientes</option>
                        <option value="placed">Apostados</option>
                        <option value="finished">Finalizados</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Grupo:</label>
                    <select id="filter-group">
                        <option value="all">Todos</option>
                        <option value="A">Grupo A</option>
                        <option value="B">Grupo B</option>
                        <option value="C">Grupo C</option>
                        <option value="D">Grupo D</option>
                        <option value="E">Grupo E</option>
                        <option value="F">Grupo F</option>
                        <option value="G">Grupo G</option>
                        <option value="H">Grupo H</option>
                        <option value="I">Grupo I</option>
                        <option value="J">Grupo J</option>
                        <option value="K">Grupo K</option>
                        <option value="L">Grupo L</option>
                    </select>
                </div>
            </div>

            <!-- Resumen de Apuestas -->
            <div class="bets-summary">
                <div class="summary-card">
                    <span class="summary-number" id="total-bets">0</span>
                    <span class="summary-label">Total Apuestas</span>
                </div>
                <div class="summary-card">
                    <span class="summary-number" id="pending-bets">0</span>
                    <span class="summary-label">Pendientes</span>
                </div>
                <div class="summary-card">
                    <span class="summary-number" id="placed-bets">0</span>
                    <span class="summary-label">Realizadas</span>
                </div>
                <div class="summary-card">
                    <span class="summary-number" id="finished-bets">0</span>
                    <span class="summary-label">Finalizadas</span>
                </div>
            </div>

            <!-- Lista de Partidos -->
            <div class="matches-betting" id="matches-betting">
                <!-- Se llena con JS -->
            </div>
        </div>
    </main>

    <!-- Modal de Confirmación de Apuesta -->
    <div id="bet-modal" class="modal">
        <div class="modal-content bet-modal-content">
            <span class="modal-close">&times;</span>
            <div class="bet-confirm">
                <h3><i class="fas fa-check-circle"></i> Confirmar Apuesta</h3>
                <div class="bet-summary" id="bet-summary"></div>
                <div class="bet-actions">
                    <button class="btn-cancel" onclick="closeBetModal()">Cancelar</button>
                    <button class="btn-confirm" onclick="confirmBet()">Confirmar Apuesta</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/apuestas.js"></script>
</body>
</html>
